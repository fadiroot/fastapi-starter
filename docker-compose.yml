version: '3.8'

services:
  app:
    build: .
    container_name: fastapi-strter-app
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      POSTGRESQL_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/app
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - app_network
    restart: unless-stopped
    command: uvicorn src.main:app --host 0.0.0.0 --port 8000

  postgres:
    image: postgres:16-alpine
    container_name: fastapi-strter-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: app
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - app_network

volumes:
  postgres_data:

networks:
  app_network:
    driver: bridge
